version: 2

models:

  # ---------------------------------------------------------------------------
  # dim_branch
  # ---------------------------------------------------------------------------
  - name: dim_branch
    description: "Dimension de sucursales activas. Grain: un registro por sucursal."
    config:
      contract:
        enforced: true
      materialized: table
      tags: ['loan_portfolio_risk']
    columns:
      - name: branch_id
        description: "PK de la sucursal"
        data_type: string
        constraints:
          - type: not_null
          - type: unique
        tests:
          - not_null
          - unique
      - name: branch_name
        description: "Nombre de la sucursal"
        data_type: string
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: region
        description: "Region geografica de la sucursal"
        data_type: string
        constraints:
          - type: not_null
        tests:
          - not_null
          # Traceability: CA-01 / T-20 — accepted_values for region in dim_branch
          - accepted_values:
              arguments:
                values: ['norte', 'sur', 'este', 'oeste', 'centro']
      - name: zone
        description: "Zona comercial de la sucursal"
        data_type: string

  # ---------------------------------------------------------------------------
  # dim_customer
  # ---------------------------------------------------------------------------
  - name: dim_customer
    description: >
      Dimension de clientes activos con atributos de segmento y sucursal.
      Grain: un registro por customer_id.
      Incluye datos de sucursal enriquecidos via JOIN con stg_reference_data__branches.
    config:
      contract:
        enforced: true
      materialized: table
      tags: ['loan_portfolio_risk']
    columns:
      - name: customer_id
        description: "PK del cliente"
        data_type: string
        constraints:
          - type: not_null
          - type: unique
        tests:
          - not_null
          - unique
      - name: customer_type
        description: "Tipo de cliente: individual, business"
        data_type: string
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: segment
        description: "Segmento del cliente: retail, premium, private_banking, sme, corporate"
        data_type: string
        constraints:
          - type: not_null
        tests:
          - not_null
          # Traceability: CA-01 / T-20 — accepted_values for segment in dim_customer
          - accepted_values:
              arguments:
                values: ['retail', 'premium', 'private_banking', 'sme', 'corporate']
      - name: branch_id
        description: "FK a dim_branch. Puede ser NULL si el cliente no tiene sucursal asignada."
        data_type: string
      - name: branch_name
        description: "Nombre de la sucursal del cliente (desnormalizado)"
        data_type: string
      - name: region
        description: "Region de la sucursal del cliente (desnormalizado)"
        data_type: string
        tests:
          # Traceability: CA-01 / T-20 — accepted_values for region in dim_customer (desnormalized)
          - accepted_values:
              arguments:
                values: ['norte', 'sur', 'este', 'oeste', 'centro']
      - name: zone
        description: "Zona comercial de la sucursal del cliente (desnormalizado)"
        data_type: string
      - name: country
        description: "Pais del cliente"
        data_type: string
      - name: registration_date
        description: "Fecha de alta del cliente"
        data_type: date

  # ---------------------------------------------------------------------------
  # dim_loan
  # ---------------------------------------------------------------------------
  - name: dim_loan
    description: >
      Dimension de prestamos con atributos estaticos y de producto.
      Grain: un registro por loan_id.
      Incluye datos de producto enriquecidos via JOIN con stg_reference_data__product_catalog.
    config:
      contract:
        enforced: true
      materialized: table
      tags: ['loan_portfolio_risk']
    columns:
      - name: loan_id
        description: "PK del prestamo"
        data_type: string
        constraints:
          - type: not_null
          - type: unique
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "FK a dim_customer"
        data_type: string
        constraints:
          - type: not_null
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_id
      - name: account_id
        description: "FK a accounts en el sistema bancario"
        data_type: string
      - name: product_type
        description: "Tipo de producto: mortgage, consumer, business, credit_line"
        data_type: string
        constraints:
          - type: not_null
        tests:
          - not_null
          # Traceability: CA-01 / T-20 — accepted_values for product_type in dim_loan
          - accepted_values:
              arguments:
                values: ['mortgage', 'consumer', 'business', 'credit_line']
      - name: product_name
        description: "Nombre comercial del producto (de stg_reference_data__product_catalog)"
        data_type: string
      - name: product_category
        description: "Categoria del producto"
        data_type: string
      - name: origination_date
        description: "Fecha de apertura del prestamo"
        data_type: date
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: maturity_date
        description: "Fecha de vencimiento del prestamo"
        data_type: date
      - name: original_amount
        description: "Importe original del prestamo en EUR"
        data_type: numeric
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: interest_rate
        description: "Tipo de interes anual"
        data_type: numeric
      - name: collateral_value
        description: "Valor de la garantia en EUR. NULL para prestamos sin colateral."
        data_type: numeric
      - name: loan_to_value
        description: >
          Ratio saldo vivo / valor garantia. NULL para prestamos sin colateral.
          Solo relevante para hipotecas (product_type = 'mortgage').
        data_type: numeric
      - name: loan_status
        description: "Estado del prestamo: active, closed, defaulted, restructured"
        data_type: string
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: risk_rating
        description: "Calificacion interna de riesgo del prestamo"
        data_type: string

  # ---------------------------------------------------------------------------
  # fct_loan_daily_snapshot
  # ---------------------------------------------------------------------------
  - name: fct_loan_daily_snapshot
    description: >
      Foto diaria del estado de cada prestamo activo o reestructurado.
      Grain: un registro por loan_id por snapshot_date.
      Incluye clasificacion de morosidad, stage IFRS 9, provision calculada e indicador NPL.
      Modelo incremental (delete+insert) por unique_key [loan_id, snapshot_date].
      Implementa CA-01 (NPL), CA-02 (buckets), CA-03 (snapshot diario), CA-04 (provisiones).
    # Traceability: CA-01, CA-02 — grain: one row per loan per day
    # CRITICAL-02 fix: composite PK uniqueness test (unique_key config controls merge behavior only,
    # not data integrity — this test validates the materialized table has no duplicate combinations).
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - loan_id
              - snapshot_date
    config:
      contract:
        enforced: true
      materialized: incremental
      unique_key:
        - loan_id
        - snapshot_date
      incremental_strategy: delete+insert
      on_schema_change: append_new_columns
      tags: ['loan_portfolio_risk']
    columns:
      - name: loan_id
        description: "FK a dim_loan"
        data_type: string
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: snapshot_date
        description: "Fecha del snapshot diario"
        data_type: date
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: customer_id
        description: "FK a dim_customer (desnormalizado)"
        data_type: string
        constraints:
          - type: not_null
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_id
      - name: branch_id
        description: "FK a dim_branch (desnormalizado desde dim_customer)"
        data_type: string
      - name: product_type
        description: "Tipo de producto (desnormalizado para rendimiento en queries)"
        data_type: string
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: segment
        description: "Segmento del cliente (desnormalizado para rendimiento)"
        data_type: string
      - name: outstanding_balance
        description: "Saldo vivo del prestamo en EUR en la fecha del snapshot"
        data_type: numeric
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: max_days_past_due
        description: "Maximo dias de mora en la fecha del snapshot"
        data_type: integer
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: delinquency_bucket
        description: "Bucket de morosidad: current, 1_30, 31_60, 61_90, over_90"
        data_type: string
        constraints:
          - type: not_null
        tests:
          - not_null
          # Traceability: CA-02 / T-21 — accepted_values for delinquency_bucket in fct_loan_daily_snapshot
          - accepted_values:
              arguments:
                values: ['current', '1_30', '31_60', '61_90', 'over_90']
      - name: ifrs9_stage
        description: "IFRS 9 stage: 1 (performing), 2 (underperforming), 3 (non-performing)"
        data_type: integer
        constraints:
          - type: not_null
        tests:
          - not_null
          # Traceability: CA-04 / T-21 — accepted_values for ifrs9_stage in fct_loan_daily_snapshot
          - accepted_values:
              arguments:
                values: [1, 2, 3]
      - name: provision_rate
        description: "Tasa de provision IFRS 9 aplicada"
        data_type: numeric
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: provision_amount
        description: "Importe provisionado en EUR: outstanding_balance * provision_rate"
        data_type: numeric
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: is_npl
        description: "True si el prestamo es non-performing (delinquency_bucket = 'over_90')"
        data_type: boolean
        constraints:
          - type: not_null
        tests:
          - not_null

  # ---------------------------------------------------------------------------
  # fct_loan_payment
  # ---------------------------------------------------------------------------
  - name: fct_loan_payment
    # Traceability: CA-05 / T-22 — row count audit checks on DQ models (severity: warn)
    # dq_row_count_below_threshold verifies orphan anomaly tables do not exceed
    # the acceptable threshold. Configured as warn so pipeline is never blocked.
    tests:
      - dq_row_count_below_threshold:
          arguments:
            dq_model: ref('int_dq__orphan_payments')
            threshold: 1000
          config:
            severity: warn
          name: warn_orphan_payments_below_threshold
      - dq_row_count_below_threshold:
          arguments:
            dq_model: ref('int_dq__orphan_loans')
            threshold: 1000
          config:
            severity: warn
          name: warn_orphan_loans_below_threshold
    description: >
      Historial de pagos de prestamos, excluyendo pagos huerfanos.
      Grain: un registro por payment_id.
      Modelo incremental (delete+insert) por unique_key payment_id.
      Implementa CA-05 (excluye pagos sin prestamo asociado).
    config:
      contract:
        enforced: true
      materialized: incremental
      unique_key: payment_id
      incremental_strategy: delete+insert
      on_schema_change: append_new_columns
      tags: ['loan_portfolio_risk']
    columns:
      - name: payment_id
        description: "PK del pago"
        data_type: string
        constraints:
          - type: not_null
          - type: unique
        tests:
          - not_null
          - unique
      - name: loan_id
        description: "FK a dim_loan"
        data_type: string
        constraints:
          - type: not_null
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_loan')
                field: loan_id
      - name: due_date
        description: "Fecha prevista de pago"
        data_type: date
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: payment_date
        description: "Fecha real de pago. NULL si el pago no se ha realizado."
        data_type: date
      - name: amount_due
        description: "Importe previsto del pago en EUR"
        data_type: numeric
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: amount_paid
        description: "Importe real pagado en EUR. NULL si no se ha pagado."
        data_type: numeric
      - name: principal_component
        description: "Componente de principal del pago en EUR"
        data_type: numeric
      - name: interest_component
        description: "Componente de intereses del pago en EUR"
        data_type: numeric
      - name: days_past_due
        description: "Dias de retraso del pago"
        data_type: integer
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: payment_status
        description: "Estado del pago: paid, partial, unpaid, written_off"
        data_type: string
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: is_overdue
        description: "True si el pago tiene retraso (days_past_due > 0)"
        data_type: boolean
        constraints:
          - type: not_null
        tests:
          - not_null
      - name: loaded_at
        description: "Timestamp de carga del registro en el warehouse"
        data_type: timestamp_ntz
