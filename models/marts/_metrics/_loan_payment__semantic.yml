version: 2

semantic_models:
  - name: loan_payment
    description: "Historial de pagos de prestamos. Grain: un registro por payment_id. Base para metricas de recuperacion (recovery_rate). Excluye pagos huerfanos (sin prestamo asociado)."
    model: ref('fct_loan_payment')
    defaults:
      agg_time_dimension: due_date

    entities:
      - name: payment
        description: "Entidad primaria: un registro por pago unico."
        type: primary
        expr: payment_id
      - name: loan
        description: "Referencia al prestamo al que pertenece el pago. FK a dim_loan."
        type: foreign
        expr: loan_id

    dimensions:
      - name: due_date
        description: "Fecha prevista de pago. Dimension temporal principal para analisis de recuperacion."
        type: time
        expr: due_date
        type_params:
          time_granularity: day
      - name: payment_date
        description: "Fecha real en la que se efectuo el pago. NULL si el pago no se ha realizado."
        type: time
        expr: payment_date
        type_params:
          time_granularity: day
      - name: payment_status
        description: "Estado del pago: paid, partial, unpaid, written_off."
        type: categorical
        expr: payment_status
      - name: is_overdue
        description: "Indicador de pago con retraso (days_past_due > 0)."
        type: categorical
        expr: "cast(is_overdue as varchar)"

    measures:
      - name: total_amount_paid
        description: "Importe total realmente pagado en EUR. Numerador del recovery_rate."
        agg: sum
        expr: amount_paid
      - name: total_amount_due
        description: "Importe total previsto a cobrar en EUR. Denominador del recovery_rate."
        agg: sum
        expr: amount_due
      - name: payment_count
        description: "Numero de pagos distintos en el historial."
        agg: count_distinct
        expr: payment_id
