version: 2

metrics:
  # ---------------------------------------------------------------------------
  # Base measures exposed as simple metrics (used internally by derived metrics)
  # ---------------------------------------------------------------------------
  - name: npl_balance
    description: "Saldo vivo de prestamos non-performing (delinquency_bucket = 'over_90') en EUR."
    label: "NPL Balance"
    type: simple
    type_params:
      measure:
        name: npl_balance

  - name: total_provision_amount
    description: "Provisiones IFRS 9 totales calculadas en EUR."
    label: "Total Provision Amount"
    type: simple
    type_params:
      measure:
        name: total_provision_amount

  - name: total_amount_paid
    description: "Importe total realmente pagado en EUR."
    label: "Total Amount Paid"
    type: simple
    type_params:
      measure:
        name: total_amount_paid

  - name: total_amount_due
    description: "Importe total previsto a cobrar en EUR."
    label: "Total Amount Due"
    type: simple
    type_params:
      measure:
        name: total_amount_due

  # ---------------------------------------------------------------------------
  # total_exposure_ead (simple)
  # Responde: BQ-03 — exposicion total por producto y segmento
  # ---------------------------------------------------------------------------
  - name: total_exposure_ead
    description: "Exposicion total al riesgo (EAD): suma del saldo vivo de toda la cartera activa en EUR. Responde BQ-03."
    label: "Total Exposure (EAD)"
    type: simple
    type_params:
      measure:
        name: total_outstanding_balance

  # ---------------------------------------------------------------------------
  # npl_ratio (derived)
  # Responde: BQ-01, BQ-02 — tasa de morosidad global y por segmento
  # ---------------------------------------------------------------------------
  - name: npl_ratio
    description: "Tasa de morosidad (NPL ratio): saldo de prestamos >90 dias / saldo total cartera activa. Responde BQ-01, BQ-02."
    label: "NPL Ratio"
    type: derived
    type_params:
      expr: "npl_balance / nullif(total_exposure_ead, 0)"
      metrics:
        - name: npl_balance
        - name: total_exposure_ead

  # ---------------------------------------------------------------------------
  # provision_coverage_ratio (derived)
  # Responde: BQ-04 — cobertura de provisiones por bucket de morosidad
  # ---------------------------------------------------------------------------
  - name: provision_coverage_ratio
    description: "Ratio de cobertura de provisiones: provisiones IFRS 9 / exposicion total (EAD). Responde BQ-04."
    label: "Provision Coverage Ratio"
    type: derived
    type_params:
      expr: "total_provision_amount / nullif(total_exposure_ead, 0)"
      metrics:
        - name: total_provision_amount
        - name: total_exposure_ead

  # ---------------------------------------------------------------------------
  # loans_at_risk_count (simple, filtered)
  # Responde: BQ-05, BQ-06 — prestamos en mora distintos de 'current'
  # ---------------------------------------------------------------------------
  - name: loans_at_risk_count
    description: "Numero de prestamos en riesgo (delinquency_bucket != 'current'). Incluye buckets 1_30, 31_60, 61_90, over_90. Responde BQ-05, BQ-06."
    label: "Loans at Risk (Count)"
    type: simple
    type_params:
      measure:
        name: loan_count
    filter: |
      {{ Dimension('snapshot__delinquency_bucket') }} != 'current'

  # ---------------------------------------------------------------------------
  # loans_at_risk_balance (simple, filtered)
  # Responde: BQ-05, BQ-06 — saldo vivo de prestamos en riesgo
  # ---------------------------------------------------------------------------
  - name: loans_at_risk_balance
    description: "Saldo vivo en EUR de prestamos en riesgo (delinquency_bucket != 'current'). Responde BQ-05, BQ-06."
    label: "Loans at Risk (Balance)"
    type: simple
    type_params:
      measure:
        name: total_outstanding_balance
    filter: |
      {{ Dimension('snapshot__delinquency_bucket') }} != 'current'

  # ---------------------------------------------------------------------------
  # recovery_rate (derived)
  # Responde: BQ-10 — tasa de recuperacion historica
  # Requiere semantic model loan_payment (T-28)
  # ---------------------------------------------------------------------------
  - name: recovery_rate
    description: "Tasa de recuperacion historica: importe total pagado / importe total previsto. Calculado sobre el historial de pagos de fct_loan_payment. Responde BQ-10."
    label: "Recovery Rate"
    type: derived
    type_params:
      expr: "total_amount_paid / nullif(total_amount_due, 0)"
      metrics:
        - name: total_amount_paid
        - name: total_amount_due
