version: 2

models:
  - name: metricflow_time_spine
    description: "Time spine requerido por MetricFlow para operaciones de dimension temporal en el Semantic Layer. Cubre desde 2022-01-01 (inicio de datos Temenos) hasta 2030-12-31 con granularidad de dia. Generado con dbt_utils.date_spine para portabilidad cross-warehouse."
    config:
      materialized: table
    time_spine:
      standard_granularity_column: date_day
    columns:
      - name: date_day
        description: "Primary date column for MetricFlow time spine"
        granularity: day
