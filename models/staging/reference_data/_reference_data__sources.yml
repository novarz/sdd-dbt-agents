version: 2

sources:
  - name: reference_data
    description: "Datos de referencia de MDM"
    database: ANALYTICS
    schema: dbt_sduran_reference_data
    tables:
      - name: branches
        description: "Catalogo de sucursales activas. Grain: un registro por branch_id. ~500 filas."
        identifier: branches
        config:
          freshness:
            warn_after:
              count: 7
              period: day
            error_after:
              count: 14
              period: day
        columns:
          - name: branch_id
            description: "PK de la sucursal"
            tests:
              - not_null
              - unique
          - name: branch_name
            description: "Nombre de la sucursal"
          - name: region
            description: "Region geografica: norte, sur, este, oeste, centro"
          - name: zone
            description: "Zona comercial"
          - name: is_active
            description: "Indica si la sucursal esta activa"

      - name: product_catalog
        description: "Catalogo de productos de prestamo. Grain: un registro por product_type. ~200 filas."
        identifier: product_catalog
        config:
          freshness: null
        columns:
          - name: product_type
            description: "PK del tipo de producto: mortgage, consumer, business, credit_line"
            tests:
              - not_null
              - unique
          - name: product_name
            description: "Nombre del producto"
          - name: product_category
            description: "Categoria del producto"
          - name: max_ltv
            description: "Loan-to-value maximo permitido"
          - name: min_interest_rate
            description: "Tipo de interes minimo"
          - name: max_term_months
            description: "Plazo maximo en meses"
