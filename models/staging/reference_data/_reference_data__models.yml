version: 2

models:
  - name: stg_reference_data__branches
    description: >
      Staging model for branches reference data. Grain: one row per branch_id.
      Only includes active branches (is_active = true).
    config:
      materialized: view
    columns:
      - name: branch_id
        description: "PK de la sucursal"
        tests:
          - not_null
          - unique
      - name: branch_name
        description: "Nombre de la sucursal"
        tests:
          - not_null
      - name: region
        description: "Region geografica: norte, sur, este, oeste, centro"
        tests:
          - not_null
      - name: zone
        description: "Zona comercial"
      - name: is_active
        description: "Siempre true en este modelo (filtrado en staging)"

  - name: stg_reference_data__product_catalog
    description: >
      Staging model for product catalog reference data. Grain: one row per product_type.
      Renames columns to snake_case and applies type casts.
    config:
      materialized: view
    columns:
      - name: product_type
        description: "PK del tipo de producto: mortgage, consumer, business, credit_line"
        tests:
          - not_null
          - unique
      - name: product_name
        description: "Nombre comercial del producto"
      - name: product_category
        description: "Categoria del producto"
      - name: max_ltv
        description: "Loan-to-value maximo permitido para este producto"
      - name: min_interest_rate
        description: "Tipo de interes minimo aplicable"
      - name: max_term_months
        description: "Plazo maximo del prestamo en meses"
