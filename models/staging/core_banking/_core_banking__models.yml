version: 2

models:
  - name: stg_core_banking__loans
    description: >
      Staging model for core banking loans. Grain: one row per loan_id.
      Applies type casts, calculates loan_to_value, and filters out records
      with null loan_status.
    config:
      materialized: view
    columns:
      - name: loan_id
        description: "PK del prestamo"
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "FK a customers"
        tests:
          - not_null
      - name: account_id
        description: "FK a accounts"
      - name: product_type
        description: "Tipo de producto: mortgage, consumer, business, credit_line"
        tests:
          - not_null
      - name: origination_date
        description: "Fecha de apertura del prestamo"
      - name: maturity_date
        description: "Fecha de vencimiento del prestamo"
      - name: original_amount
        description: "Importe original en EUR"
      - name: outstanding_balance
        description: "Saldo vivo actual en EUR"
      - name: interest_rate
        description: "Tipo de interes anual"
      - name: collateral_value
        description: "Valor de la garantia. Solo relevante para hipotecas."
      - name: loan_status
        description: "Estado del prestamo: active, closed, defaulted, restructured"
        tests:
          - not_null
      - name: risk_rating
        description: "Calificacion interna de riesgo"
      - name: loaded_at
        description: "Timestamp de carga del registro"
      - name: loan_to_value
        description: "Ratio saldo vivo / valor garantia. NULL para prestamos sin colateral."

  - name: stg_core_banking__loan_payments
    description: >
      Staging model for loan payments. Grain: one row per payment_id.
      Applies type casts and defaults days_past_due to 0 when NULL.
    config:
      materialized: view
    columns:
      - name: payment_id
        description: "PK del pago"
        tests:
          - not_null
          - unique
      - name: loan_id
        description: "FK a loans"
        tests:
          - not_null
      - name: due_date
        description: "Fecha prevista de pago"
        tests:
          - not_null
      - name: payment_date
        description: "Fecha real de pago. NULL si el pago no se ha realizado."
      - name: amount_due
        description: "Importe previsto en EUR"
        tests:
          - not_null
      - name: amount_paid
        description: "Importe real pagado en EUR"
      - name: principal_component
        description: "Componente de principal del pago en EUR"
      - name: interest_component
        description: "Componente de intereses del pago en EUR"
      - name: days_past_due
        description: "Dias de retraso. Valor 0 cuando al corriente o cuando la fuente es NULL."
        tests:
          - not_null
      - name: payment_status
        description: "Estado del pago: paid, partial, unpaid, written_off"
        tests:
          - not_null
      - name: loaded_at
        description: "Timestamp de carga del registro"

  - name: stg_core_banking__customers
    description: >
      Staging model for customers. Grain: one row per customer_id.
      Only includes active customers (is_active = true).
    config:
      materialized: view
    columns:
      - name: customer_id
        description: "PK del cliente"
        tests:
          - not_null
          - unique
      - name: customer_type
        description: "Tipo de cliente: individual, business"
        tests:
          - not_null
      - name: segment
        description: "Segmento del cliente: retail, premium, private_banking, sme, corporate"
        tests:
          - not_null
      - name: branch_id
        description: "FK a branches. Puede ser NULL si el cliente no tiene sucursal asignada."
      - name: country
        description: "Pais del cliente"
      - name: registration_date
        description: "Fecha de registro del cliente"
      - name: is_active
        description: "Siempre true en este modelo (filtrado en staging)"
      - name: loaded_at
        description: "Timestamp de carga del registro"
