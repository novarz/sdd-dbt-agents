name: loan_portfolio_risk
version: '1.0.0'
config-version: 2
profile: loan_portfolio_risk

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

vars:
  loan_portfolio_risk:
    active_loan_statuses: ['active', 'restructured']

models:
  loan_portfolio_risk:
    +tags: ['loan_portfolio_risk']
    staging:
      +materialized: view
      +schema: staging
      +group: risk_data_engineering
      +access: protected
      core_banking:
        +group: risk_data_engineering
      reference_data:
        +group: risk_data_engineering
    intermediate:
      +materialized: ephemeral
      +group: risk_data_engineering
      +access: protected
      loan_risk:
        +materialized: ephemeral
      data_quality:
        +materialized: table
        +access: private
    marts:
      +materialized: table
      +schema: marts
      +group: risk_data_engineering
      +access: public

seeds:
  loan_portfolio_risk:
    ifrs9_provision_rates:
      +column_types:
        delinquency_bucket: varchar
        ifrs9_stage: integer
        provision_rate: numeric
