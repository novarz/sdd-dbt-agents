name: loan_portfolio_risk
version: '1.0.0'
config-version: 2
profile: loan_portfolio_risk

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

vars:
  loan_portfolio_risk:
    active_loan_statuses: ['active', 'restructured']
    # Source location — uses env_var() so dbt Platform can override per environment.
    # Fallback values match the seed schemas for local/demo development.
    # For real projects, set DBT_SOURCE_DATABASE and DBT_SOURCE_SCHEMA_PREFIX
    # per environment in dbt Platform (managed by Terraform).
    source_database: "{{ env_var('DBT_SOURCE_DATABASE', 'ANALYTICS') }}"
    source_schema_prefix: "{{ env_var('DBT_SOURCE_SCHEMA_PREFIX', 'dbt_sduran') }}"

models:
  loan_portfolio_risk:
    +tags: ['loan_portfolio_risk']
    staging:
      +materialized: view
      +schema: staging
      +group: risk_data_engineering
      +access: protected
      core_banking:
        +group: risk_data_engineering
      reference_data:
        +group: risk_data_engineering
    intermediate:
      +materialized: ephemeral
      +group: risk_data_engineering
      +access: protected
      loan_risk:
        +materialized: ephemeral
      data_quality:
        +materialized: table
        +access: private
    marts:
      +materialized: table
      +schema: marts
      +group: risk_data_engineering
      +access: public

seeds:
  loan_portfolio_risk:
    ifrs9_provision_rates:
      +column_types:
        delinquency_bucket: varchar
        ifrs9_stage: integer
        provision_rate: numeric
    core_banking:
      +database: "{{ env_var('DBT_SOURCE_DATABASE', 'ANALYTICS') }}"
      +schema: "{{ env_var('DBT_SOURCE_SCHEMA_PREFIX', 'dbt_sduran') }}_core_banking"
    reference_data:
      +database: "{{ env_var('DBT_SOURCE_DATABASE', 'ANALYTICS') }}"
      +schema: "{{ env_var('DBT_SOURCE_SCHEMA_PREFIX', 'dbt_sduran') }}_reference_data"
