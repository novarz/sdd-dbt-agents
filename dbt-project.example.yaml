# dbt-project.yaml — Config file for /dbt-project-setup
# Copy this file to your project root as dbt-project.yaml and fill in the values.
# NEVER commit dbt_token or snowflake_password — use environment variables instead.

# ─── dbt Cloud ────────────────────────────────────────────────────────────────
dbt_account_id: 000                        # REPLACE: your dbt Cloud account ID
dbt_host_url: "https://emea.dbt.com/api"  # REPLACE: https://{prefix}.dbt.com/api

# ─── Project ──────────────────────────────────────────────────────────────────
project_name: "my_project"                 # REPLACE
dbt_version: "versionless"

# ─── Git repository ───────────────────────────────────────────────────────────
git_remote_url: "git@github.com:MY_ORG/MY_REPO.git"  # REPLACE
git_clone_strategy: "github_app"
github_installation_id: 000000000         # REPLACE: GitHub App installation ID for your org

# ─── Snowflake ────────────────────────────────────────────────────────────────
snowflake_account: "MY_ACCOUNT"            # REPLACE: e.g. zna84829
snowflake_database: "MY_DATABASE"          # REPLACE
snowflake_warehouse: "MY_WAREHOUSE"        # REPLACE
snowflake_user: "MY_USER"                  # REPLACE
snowflake_role: ""                         # optional

# ─── Schemas ──────────────────────────────────────────────────────────────────
schema_prefix: "dbt_myproject"             # REPLACE
schema_development: "dev"
schema_staging: "staging"
schema_production: "prod"

# ─── Jobs ─────────────────────────────────────────────────────────────────────
daily_job_schedule_hours: [6]             # UTC hour

# ─── SENSITIVE — export these as env vars, never write them here ───────────────
# export TF_VAR_dbt_token="dbtc_..."
# export TF_VAR_snowflake_password="..."
