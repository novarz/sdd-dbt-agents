version: 2

# Traceability: CA-01 / T-26
# Validates that int_loan__delinquency_bands (and therefore fct_loan_daily_snapshot)
# only includes loans with loan_status IN ('active', 'restructured').
# Loans with loan_status = 'closed', 'defaulted', or any other status are excluded.
# The filter is implemented in int_loan__delinquency_bands via the active_loan_statuses var.

unit_tests:
  - name: test_excluded_loan_statuses
    description: >
      Validates that loans with loan_status outside ('active', 'restructured') are
      excluded from the delinquency classification pipeline. A loan with
      loan_status = 'closed' must not appear in the output of int_loan__delinquency_bands,
      and therefore will not appear in fct_loan_daily_snapshot.
      Traceability: CA-01 from requirements.md
    model: int_loan__delinquency_bands

    given:
      - input: ref('stg_core_banking__loans')
        rows:
          # Should be included — active loan
          - loan_id: "L001"
            customer_id: "C001"
            product_type: "mortgage"
            outstanding_balance: 80000.00
            loan_status: "active"
            account_id: "A001"
            original_amount: 100000.00
            interest_rate: 0.035
            collateral_value: 120000.00
            loan_to_value: 0.667
            origination_date: "2022-01-01"
            maturity_date: "2042-01-01"
            risk_rating: "BBB"
            loaded_at: "2026-04-15T02:00:00"
          # Should be included — restructured loan
          - loan_id: "L002"
            customer_id: "C002"
            product_type: "consumer"
            outstanding_balance: 10000.00
            loan_status: "restructured"
            account_id: "A002"
            original_amount: 15000.00
            interest_rate: 0.08
            collateral_value: null
            loan_to_value: null
            origination_date: "2023-01-01"
            maturity_date: "2026-01-01"
            risk_rating: "B"
            loaded_at: "2026-04-15T02:00:00"
          # Should be EXCLUDED — closed loan
          - loan_id: "L003"
            customer_id: "C003"
            product_type: "business"
            outstanding_balance: 0.00
            loan_status: "closed"
            account_id: "A003"
            original_amount: 30000.00
            interest_rate: 0.05
            collateral_value: null
            loan_to_value: null
            origination_date: "2020-01-01"
            maturity_date: "2025-01-01"
            risk_rating: "A"
            loaded_at: "2026-04-15T02:00:00"
          # Should be EXCLUDED — defaulted loan
          - loan_id: "L004"
            customer_id: "C004"
            product_type: "consumer"
            outstanding_balance: 5000.00
            loan_status: "defaulted"
            account_id: "A004"
            original_amount: 8000.00
            interest_rate: 0.10
            collateral_value: null
            loan_to_value: null
            origination_date: "2021-06-01"
            maturity_date: "2024-06-01"
            risk_rating: "CCC"
            loaded_at: "2026-04-15T02:00:00"

      - input: ref('int_loan__max_days_past_due')
        rows:
          - loan_id: "L001"
            max_days_past_due: 0
          - loan_id: "L002"
            max_days_past_due: 45
          # L003 and L004 are filtered before the join, so no entry needed

    expect:
      rows:
        # Only active and restructured loans appear in the output
        - loan_id: "L001"
          loan_status: "active"
          delinquency_bucket: "current"
        - loan_id: "L002"
          loan_status: "restructured"
          delinquency_bucket: "31_60"
        # L003 (closed) and L004 (defaulted) must NOT appear in output
