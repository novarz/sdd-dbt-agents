version: 2

# Traceability: CA-02 / T-23
# Validates that the delinquency bucket classification in int_loan__delinquency_bands
# correctly maps max_days_past_due values to buckets and IFRS 9 stages.
# Each boundary of the CASE WHEN logic is exercised to ensure deterministic assignment.

unit_tests:
  - name: test_delinquency_bucket_classification
    description: >
      Validates that int_loan__delinquency_bands correctly classifies loans into
      delinquency buckets and assigns the corresponding IFRS 9 stage based on
      max_days_past_due. Tests all five bucket boundaries.
      Traceability: CA-02 from requirements.md
    model: int_loan__delinquency_bands

    given:
      - input: ref('stg_core_banking__loans')
        rows:
          - loan_id: "L001"
            customer_id: "C001"
            product_type: "mortgage"
            outstanding_balance: 100000.00
            loan_status: "active"
            account_id: "A001"
            original_amount: 120000.00
            interest_rate: 0.035
            collateral_value: 150000.00
            loan_to_value: 0.667
            origination_date: "2022-01-15"
            maturity_date: "2042-01-15"
            risk_rating: "BBB"
            loaded_at: "2026-04-15T02:00:00"
          - loan_id: "L002"
            customer_id: "C002"
            product_type: "consumer"
            outstanding_balance: 15000.00
            loan_status: "active"
            account_id: "A002"
            original_amount: 20000.00
            interest_rate: 0.08
            collateral_value: null
            loan_to_value: null
            origination_date: "2023-06-01"
            maturity_date: "2028-06-01"
            risk_rating: "BB"
            loaded_at: "2026-04-15T02:00:00"
          - loan_id: "L003"
            customer_id: "C003"
            product_type: "business"
            outstanding_balance: 50000.00
            loan_status: "restructured"
            account_id: "A003"
            original_amount: 60000.00
            interest_rate: 0.05
            collateral_value: null
            loan_to_value: null
            origination_date: "2021-03-10"
            maturity_date: "2031-03-10"
            risk_rating: "B"
            loaded_at: "2026-04-15T02:00:00"
          - loan_id: "L004"
            customer_id: "C004"
            product_type: "consumer"
            outstanding_balance: 8000.00
            loan_status: "active"
            account_id: "A004"
            original_amount: 10000.00
            interest_rate: 0.10
            collateral_value: null
            loan_to_value: null
            origination_date: "2024-01-01"
            maturity_date: "2027-01-01"
            risk_rating: "CCC"
            loaded_at: "2026-04-15T02:00:00"
          - loan_id: "L005"
            customer_id: "C005"
            product_type: "credit_line"
            outstanding_balance: 25000.00
            loan_status: "active"
            account_id: "A005"
            original_amount: 30000.00
            interest_rate: 0.06
            collateral_value: null
            loan_to_value: null
            origination_date: "2023-01-01"
            maturity_date: "2030-01-01"
            risk_rating: "A"
            loaded_at: "2026-04-15T02:00:00"

      - input: ref('int_loan__max_days_past_due')
        rows:
          # L001: 0 days → current / stage 1
          - loan_id: "L001"
            max_days_past_due: 0
          # L002: 15 days → 1_30 / stage 1
          - loan_id: "L002"
            max_days_past_due: 15
          # L003: 45 days → 31_60 / stage 2 (the primary scenario from T-23 spec)
          - loan_id: "L003"
            max_days_past_due: 45
          # L004: 75 days → 61_90 / stage 2
          - loan_id: "L004"
            max_days_past_due: 75
          # L005: 120 days → over_90 / stage 3
          - loan_id: "L005"
            max_days_past_due: 120

    expect:
      rows:
        - loan_id: "L001"
          delinquency_bucket: "current"
          ifrs9_stage: 1
        - loan_id: "L002"
          delinquency_bucket: "1_30"
          ifrs9_stage: 1
        - loan_id: "L003"
          delinquency_bucket: "31_60"
          ifrs9_stage: 2
        - loan_id: "L004"
          delinquency_bucket: "61_90"
          ifrs9_stage: 2
        - loan_id: "L005"
          delinquency_bucket: "over_90"
          ifrs9_stage: 3
